<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anfrage gesendet – SW ImmoService</title>
  <meta name="robots" content="noindex">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#f0ece4;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .box{max-width:560px;}
    .check{font-size:4rem;margin-bottom:1.5rem;}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.8rem;text-transform:uppercase;color:#fff;margin-bottom:.8rem;}
    p{color:#a8b8cc;font-size:1rem;line-height:1.7;margin-bottom:2rem;}
    .gold{color:#c9a227;}
    a{display:inline-block;background:#c9a227;color:#0d1117;padding:.9rem 2.2rem;border-radius:2px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.08em;text-transform:uppercase;}
    a:hover{background:#e8b84b;}
  </style>
</head>
<body>
  <div class="box">
    <div class="check">✓</div>
    <h1>Anfrage <span class="gold">gesendet!</span></h1>
    <p>Vielen Dank – wir haben Ihre Anfrage erhalten und melden uns schnellstmöglich zurück.<br>Mo–Sa 12:00 – 20:00 Uhr</p>
    <a href="/">Zurück zur Website</a>
  </div>
</body>
</html>
